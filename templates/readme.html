<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>因果链数据库 README.md</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #000000; /* 纯黑背景 */
            --container-bg: #0f172a; /* 深蓝黑容器 */
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1e293b;
            --code-bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            line-height: 1.75;
            color: var(--text-main);
            background-color: var(--bg-color);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto; /* 水平居中 */
            background-color: var(--container-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }
        
        .content { padding: 50px; }
        
        /* Markdown 元素暗黑适配 */
        #readme-content h1 { font-size: 2.25rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 1.5rem; color: #fff; }
        #readme-content h2 { font-size: 1.8rem; margin-top: 2.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3rem; margin-bottom: 1rem; color: #e2e8f0; }
        #readme-content h3 { font-size: 1.4rem; color: var(--primary-color); margin-top: 1.5rem; }
        
        p { margin-bottom: 1.25rem; color: #cbd5e1; }
        
        table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; background: rgba(255,255,255,0.02); }
        th, td { padding: 12px; border: 1px solid var(--border-color); text-align: left; }
        th { background: rgba(255,255,255,0.05); color: #fff; }

        blockquote {
            border-left: 4px solid var(--primary-color);
            padding: 1rem 1.5rem;
            background: rgba(99, 102, 241, 0.1);
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-style: italic;
        }
        
        .code-block {
            background: var(--code-bg);
            color: #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin: 1.5rem 0;
            position: relative;
            border: 1px solid var(--border-color);
        }
        
        .code-block pre { font-family: 'Fira Code', monospace; font-size: 0.9rem; overflow-x: auto; }
        .inline-code { background: rgba(239, 68, 68, 0.2); color: #f87171; padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; }
        
        .copy-button {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #9ca3af;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .copy-button:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }

        .lang-tag {
            position: absolute;
            top: -10px;
            left: 15px;
            background: var(--primary-color);
            color: white;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .note, .warning { padding: 15px; margin: 1rem 0; border-radius: 8px; border-left: 5px solid; }
        .note { background: rgba(59, 130, 246, 0.1); border-color: #3b82f6; color: #93c5fd; }
        .warning { background: rgba(245, 158, 11, 0.1); border-color: #f59e0b; color: #fcd34d; }

        .footer { padding: 30px; text-align: center; color: var(--text-muted); font-size: 0.85rem; border-top: 1px solid var(--border-color); }
        
        @media (max-width: 640px) {
            .content { padding: 25px; }
            #readme-content h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div id="readme-content">正在同步因果职责链...</div>
        </div>
        <div class="footer">
            <p>基于因果链数据库协议 | © 2026 Causal Chain Team</p>
        </div>
    </div>

    <script>
        window.copyCode = function(btn) {
            const code = btn.nextElementSibling.innerText;
            navigator.clipboard.writeText(code).then(() => {
                const oldIcon = btn.innerHTML;
                btn.innerHTML = '✔';
                btn.style.color = '#22c55e';
                setTimeout(() => {
                    btn.innerHTML = oldIcon;
                    btn.style.color = '';
                }, 2000);
            });
        };

        function enhancedMarkdown(md) {
            let html = md;
            const blocks = [];

            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
                const id = `BLOCK_${blocks.length}`;
                const safeCode = code.trim().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                const icon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
                
                blocks.push(`
                    <div class="code-block">
                        ${lang ? `<span class="lang-tag">${lang}</span>` : ''}
                        <div class="copy-button" onclick="copyCode(this)">${icon}</div>
                        <pre><code>${safeCode}</code></pre>
                    </div>
                `);
                return id;
            });

            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/^\s*[-*+]\s+(.*$)/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)+/gs, '<ul>$&</ul>');
            html = html.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            html = html.replace(/^(?!<[hbuolt])(.*$)/gm, function(m) {
                return m.trim() ? `<p>${m}</p>` : '';
            });
            html = html.replace(/<p>(注意|提示): (.*?)<\/p>/g, '<div class="note"><strong>$1</strong>: $2</div>');
            html = html.replace(/<p>(警告|危险): (.*?)<\/p>/g, '<div class="warning"><strong>$1</strong>: $2</div>');

            blocks.forEach((content, i) => {
                html = html.replace(`BLOCK_${i}`, content);
            });

            return html;
        }

        async function init() {
            const root = document.getElementById('readme-content');
            try {
                const res = await fetch('/api/readme/raw');
                let md = "";
                if (res.ok) {
                    md = await res.text();
                } else {
                    md = `# 因果AI职责体系\n\n本系统致力于通过因果推断提升**职责分配**的透明度。\n\n## 业务安装说明\n\n\`\`\`bash\npip install causal-logic-core\npython -m causal_service.init\n\`\`\`\n\n### Agent 业务范畴\n- **逻辑链条审计**：负责审计所有职责的因果路径。\n- **冲突消除**：业务执行过程中的逻辑冲突自动解决。\n\n> 注意: 初始职责配置需在 \`auth.json\` 中完成定义。`;
                }
                root.innerHTML = enhancedMarkdown(md);
            } catch (e) {
                root.innerHTML = `<div class="warning">连接中断: ${e.message}</div>`;
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
