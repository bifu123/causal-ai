<!-- templates/index.html -->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>历因果而知势 - 因果AI v2.6.2 - Metabolic</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/2d_main.css">

</head>
<body class="bg-black text-gray-100 overflow-hidden font-mono">

    <header class="h-12 border-b border-gray-800 flex items-center px-4 bg-gray-900 justify-between">
        <div class="flex items-center space-x-4">
            <span class="font-bold text-blue-500 tracking-widest">历因果而知势 - 因果AI - 元龙居士</span>
            <span class="text-[10px] text-gray-500 border border-gray-700 px-1">v2.6.2-Metabolic</span>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="openCreateModal()" class="bg-blue-700 hover:bg-blue-600 px-4 py-1 rounded-sm text-xs transition-colors">发起首贞</button>
            <!-- 搜索按钮 -->
            <div class="search-toggle" id="btn-toggle-search" title="展开搜索面板">
                🔍
            </div>
        </div>
    </header>

    <main class="relative">
        <div id="network"></div>
        
        <!-- 搜索面板 - 右上角可折叠 -->
        <div id="search-panel">
            <!-- 搜索表单容器 - 默认隐藏 -->
            <div class="search-form-container" id="search-form-container">
                <div class="search-form-header">
                    <div class="search-form-title">事件搜索</div>
                    <div class="search-form-close" id="btn-close-search" title="关闭搜索面板">✕</div>
                </div>
                
                <div class="search-input-group">
                    <input type="text" id="search-input" class="search-input" placeholder="输入关键词搜索事件...">
                    <select id="search-type" class="search-select">
                        <option value="keyword">关键字搜索</option>
                        <option value="serial">序列ID搜索</option>
                    </select>
                </div>
                
                <button id="btn-search" class="search-submit-button">搜索</button>
                
                <!-- 搜索结果区域 - 默认隐藏 -->
                <div id="search-results" class="search-results" style="display: none;">
                    <div class="search-empty">输入关键词开始搜索</div>
                </div>
            </div>
        </div>

        <div id="drawer" class="drawer drawer-hidden fixed right-0 top-12 w-96 h-full bg-gray-900 border-l border-gray-800 shadow-2xl z-50">
            <div class="flex justify-between items-center p-6 border-b border-gray-800">
                <h2 class="text-lg font-bold text-blue-400">龙穴详情</h2>
                <button onclick="closeDrawer()" class="text-gray-500 hover:text-white">✕</button>
            </div>

            <div id="drawer-content" class="p-6 space-y-4 overflow-y-auto" style="max-height: calc(100vh - 120px);">
                <section>
                    <label class="text-[10px] text-gray-600 uppercase tracking-tighter">卜辞</label>
                    <input id="d-node-id" type="text" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-blue-300 text-sm focus:outline-none focus:border-blue-500">
                </section>

                <section>
                    <label class="text-[10px] text-gray-600 uppercase tracking-tighter">动作标签 (Action Tag)</label>
                    <select id="d-action-tag" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-gray-300 text-sm focus:outline-none focus:border-blue-500" onchange="updateDrawerBlockTagOptions()">
                        <option value="贞">贞</option>
                        <option value="又贞">又贞</option>
                        <option value="对贞">对贞</option>
                    </select>
                </section>

                <section>
                    <label class="text-[10px] text-gray-600 uppercase tracking-tighter">因缘标签 (Block Tag)</label>
                    <select id="d-block-tag" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-gray-300 text-sm focus:outline-none focus:border-blue-500">
                        <option value="因">因 (原因/起因)</option>
                        <option value="相">相 (现象/状态)</option>
                        <option value="果">果 (结果/成果)</option>
                    </select>
                </section>

                <section>
                    <label class="text-[10px] text-gray-600 uppercase tracking-tighter">父节点 ID (Parent IDs)</label>
                    <div class="relative">
                        <input id="d-parent-ids" type="text" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-gray-300 text-sm focus:outline-none focus:border-blue-500" placeholder="点击节点图标自动填充，多个ID用|分隔">
                        <div class="absolute right-2 top-1/2 transform -translate-y-1/2">
                            <span id="parent-id-hint" class="text-xs text-gray-500 hidden">点击节点填充</span>
                        </div>
                    </div>
                    <div class="text-[9px] text-gray-600 mt-1">
                        提示：点击此输入框获得焦点后，再点击图中的节点图标，节点ID将自动填入
                    </div>
                </section>

                <section>
                    <label class="text-[10px] text-gray-600 uppercase tracking-tighter">事件叙述 (Event Tuple)</label>
                    <textarea id="d-event-tuple" class="w-full h-48 bg-gray-800 border border-gray-700 rounded px-3 py-2 text-gray-300 text-sm focus:outline-none focus:border-blue-500 resize-y"></textarea>
                </section>

                <section>
                    <label class="text-[10px] text-gray-600 uppercase tracking-tighter">生存权重 (Survival Weight)</label>
                    <div class="flex items-center space-x-4">
                        <div class="flex-1 bg-gray-800 h-1.5 rounded-full">
                            <div id="d-weight-bar" class="bg-blue-600 h-1.5 rounded-full transition-all duration-500" style="width: 100%"></div>
                        </div>
                        <span id="d-weight-value" class="text-xs text-gray-400">1.0000</span>
                    </div>
                </section>

                <section>
                    <label class="text-[10px] text-gray-600 uppercase tracking-tighter">图片上传</label>
                    <div class="space-y-2">
                        <div class="flex items-center space-x-2">
                            <input id="d-image-file" type="file" accept="image/*" class="flex-1 text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                            <button onclick="uploadImageForNode()" class="px-3 py-2 bg-blue-600 hover:bg-blue-700 text-xs rounded">上传</button>
                        </div>
                        <div id="d-image-preview" class="mt-2 hidden">
                            <img id="d-preview-img" class="max-h-32 rounded border border-gray-700 cursor-pointer hover:opacity-80 transition-opacity" onclick="openImageModal(this.src)">
                        </div>
                        <input id="d-full-image-url" type="text" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-gray-300 text-sm focus:outline-none focus:border-blue-500 mt-2" placeholder="或直接输入图片URL">
                    </div>
                </section>

                <div class="pt-6 border-t border-gray-800 grid grid-cols-2 gap-2">
                    <button onclick="saveNodeChanges()" class="py-2 bg-green-700 hover:bg-green-600 text-xs text-white">保存修改</button>
                    <button onclick="deleteCurrentNode()" class="py-2 bg-red-700 hover:bg-red-600 text-xs text-white">删除事件</button>
                </div>

                <div class="pt-3 border-t border-gray-800 grid grid-cols-2 gap-2">
                    <button onclick="deriveNode('又贞')" class="py-2 bg-gray-800 hover:bg-gray-700 text-xs text-gray-300">又贞</button>
                    <button onclick="deriveNode('对贞')" class="py-2 bg-gray-800 hover:bg-gray-700 text-xs text-gray-300">对贞</button>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/js/2d_main.js"></script>
</body>
</html>
