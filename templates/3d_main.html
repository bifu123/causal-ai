<!DOCTYPE html>
<html lang="zh-CN">
<head>


    <meta charset="UTF-8">
    <title>因果星空 - 3D 视觉实现 v1.0</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <!-- 关键修复：先加载THREE.js -->
    <!-- 使用明确创建全局THREE变量的版本 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r110/three.min.js"></script>
    
    <!-- 添加Tween.js用于相机动画 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
    
    <!-- 加载d3.js库（3d-force-graph依赖） -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    
    <!-- 然后加载3d-force-graph，它会使用已存在的THREE实例 -->
    <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.70.0/dist/3d-force-graph.min.js"></script>
    
    <link rel="stylesheet" href="/static/css/3d_main.css">
    <link rel="stylesheet" href="/static/css/3d_form.css">
</head>
<body>
    <div id="3d-graph"></div>
    
    <div id="ui-overlay">
        <div id="header">
            <h1>因果星空 · 3D 视觉实现</h1>
            <div class="subtitle">阶段一：逻辑建模期 · 骨架与巡航</div>
        </div>
        
        <div id="node-info">
            <!-- <h3>节点详情</h3>
            <div class="info-row">
                <div class="info-label">ID:</div>
                <div class="info-value" id="info-node-id">-</div>
            </div>
            <div class="info-row">
                <div class="info-label">动作标签:</div>
                <div class="info-value" id="info-action-tag">-</div>
            </div>
            <div class="info-row">
                <div class="info-label">因缘标签:</div>
                <div class="info-value" id="info-block-tag">-</div>
            </div>
            <div class="info-row">
                <div class="info-label">权重:</div>
                <div class="info-value" id="info-weight">-</div>
            </div>
            <div class="info-row">
                <div class="info-label">父节点:</div>
                <div class="info-value" id="info-parents">-</div>
            </div>
            <div class="info-row"> -->
                <div class="info-label">事件叙述:</div>
                <div class="info-value" id="info-event-tuple">-</div>
            </div>
        </div>
        
        <div id="controls">
            <div class="control-icon" id="btn-fit-view" data-tooltip="适应视图" onclick="handleFitViewClick()">
                <div class="icon-zoom">⛶</div>
            </div>
            <div class="control-icon" id="btn-dragon-cruise" data-tooltip="因果寻龙">
                <div class="icon-compass">➤</div>
            </div>
            <div class="control-icon" id="btn-create-node" data-tooltip="发起首贞">
                <div class="icon-plus">贞</div>
            </div>
        </div>
        
        <!-- 搜索面板 - 右上角可折叠 -->
        <div id="search-panel">
            <!-- 搜索图标按钮 - 默认显示 -->
            <div class="search-toggle" id="btn-toggle-search" title="展开搜索面板">
                🔍
            </div>
            
            <!-- 搜索表单容器 - 默认隐藏 -->
            <div class="search-form-container" id="search-form-container">
                <div class="search-form-header">
                    <div class="search-form-title">事件搜索</div>
                    <div class="search-form-close" id="btn-close-search" title="关闭搜索面板">✕</div>
                </div>
                
                <div class="search-input-group">
                    <input type="text" id="search-input" class="search-input" placeholder="输入关键词搜索事件...">
                    <select id="search-type" class="search-select">
                        <option value="keyword">关键字搜索</option>
                        <option value="serial">序列ID搜索</option>
                    </select>
                </div>
                
                <button id="btn-search" class="search-submit-button">搜索</button>
                
                <!-- 搜索结果区域 - 默认隐藏 -->
                <div id="search-results" class="search-results" style="display: none;">
                    <div class="search-empty">输入关键词开始搜索</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 抽屉：节点增删改功能 -->
    <div id="drawer" class="drawer drawer-hidden">
        <div class="drawer-header">
            <h2>龙穴详情</h2>
            <button id="btn-close-drawer" class="drawer-close">✕</button>
        </div>
        
        <div class="drawer-content">
            <section>
                <label class="drawer-label">卜辞（最简二元组描述）</label>
                <input id="d-node-id" type="text" class="drawer-input">
            </section>

            <section>
                <label class="drawer-label">动作标签 (Action Tag)</label>
                <select id="d-action-tag" class="drawer-select" onchange="updateDrawerBlockTagOptions()">
                    <option value="贞">贞</option>
                    <option value="又贞">又贞</option>
                    <option value="对贞">对贞</option>
                </select>
            </section>

            <section>
                <label class="drawer-label">因缘标签 (Block Tag)</label>
                <select id="d-block-tag" class="drawer-select">
                    <option value="因">因 (原因/起因)</option>
                    <option value="相">相 (现象/状态)</option>
                    <option value="果">果 (结果/成果)</option>
                </select>
            </section>

            <section>
                <label class="drawer-label">父节点 ID (Parent IDs)</label>
                <div class="relative">
                    <input id="d-parent-ids" type="text" class="drawer-input" placeholder="点击节点图标自动填充，多个ID用|分隔">
                    <div class="drawer-hint hidden" id="parent-id-hint">点击节点填充</div>
                </div>
                <div class="drawer-tip">
                    提示：点击此输入框获得焦点后，再点击图中的节点图标，节点ID将自动填入
                </div>
            </section>

            <section>
                <label class="drawer-label">事件叙述 (Event Tuple)</label>
                <textarea id="d-event-tuple" class="drawer-textarea"></textarea>
            </section>

            <section>
                <label class="drawer-label">生存权重 (Survival Weight)</label>
                <div class="weight-container">
                    <div class="weight-bar-bg">
                        <div id="d-weight-bar" class="weight-bar-fill"></div>
                    </div>
                    <span id="d-weight-value" class="weight-value">0.0000</span>
                </div>
            </section>

            <section>
                <label class="drawer-label">图片上传</label>
                <div class="image-upload-container">
                    <div class="image-upload-row">
                        <input id="d-image-file" type="file" accept="image/*" class="image-file-input">
                        <button id="btn-upload-image" class="image-upload-btn">上传</button>
                    </div>
                    <div id="d-image-preview" class="image-preview hidden">
                        <img id="d-preview-img" class="preview-image">
                    </div>
                    <input id="d-full-image-url" type="text" class="drawer-input" placeholder="或直接输入图片URL">
                </div>
            </section>

            <div class="drawer-actions">
                <button id="btn-save-node" class="btn-save">保存修改</button>
                <button id="btn-delete-node" class="btn-delete">删除事件</button>
            </div>

            <div class="drawer-derive">
                <button id="btn-derive-youzhen" class="btn-derive">又贞</button>
                <button id="btn-derive-duizhen" class="btn-derive">对贞</button>
            </div>
        </div>
    </div>

    <!-- 模态框：创建新节点 -->
    <div id="create-modal" class="modal modal-hidden">
        <div class="modal-content">
            <h3>发起首贞</h3>
            
            <div class="modal-form">
                <div class="form-group">
                    <label>卜辞（最简二元组描述）</label>
                    <input id="modal-node-id" type="text" class="modal-input">
                </div>
                
                <div class="form-group">
                    <label>事件叙述</label>
                    <textarea id="modal-event-tuple" class="modal-textarea"></textarea>
                </div>
                
                <div class="form-group">
                    <label>图片上传</label>
                    <input id="modal-image-file" type="file" accept="image/*" class="modal-file-input">
                    <div id="modal-image-preview" class="modal-image-preview hidden">
                        <img id="modal-preview-img" class="modal-preview-image">
                    </div>
                </div>
            </div>
            
            <div class="modal-actions">
                <button id="btn-cancel-create" class="btn-cancel">取消</button>
                <button id="btn-submit-create" class="btn-submit">创建</button>
            </div>
        </div>
    </div>

    <!-- 模态框：创建衍生节点 -->
    <div id="derive-modal" class="modal modal-hidden">
        <div class="modal-content">
            <h3 id="derive-title">又贞</h3>
            
            <div class="modal-form">
                <div class="form-group">
                    <label>卜辞（最简二元组描述）</label>
                    <input id="derive-node-id" type="text" class="modal-input">
                </div>
                
                <div class="form-group">
                    <label>动作标签</label>
                    <input id="derive-action-tag" type="text" class="modal-input" readonly>
                </div>
                
                <div class="form-group">
                    <label>因缘标签</label>
                    <select id="derive-block-tag" class="modal-select">
                        <option value="">请选择因缘标签</option>
                        <option value="因">因 (原因/起因)</option>
                        <option value="相">相 (现象/状态)</option>
                        <option value="果">果 (结果/成果)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>事件叙述</label>
                    <textarea id="derive-event-tuple" class="modal-textarea"></textarea>
                </div>
                
                <div class="form-group">
                    <label>图片上传</label>
                    <input id="derive-image-file" type="file" accept="image/*" class="modal-file-input">
                    <div id="derive-image-preview" class="modal-image-preview hidden">
                        <img id="derive-preview-img" class="modal-preview-image">
                    </div>
                </div>
            </div>
            
            <div class="modal-actions">
                <button id="btn-cancel-derive" class="btn-cancel">取消</button>
                <button id="btn-submit-derive" class="btn-submit">创建</button>
            </div>
        </div>
    </div>

    <!-- 图片全屏模态框 -->
    <div id="image-modal" class="modal modal-hidden">
        <div class="modal-image-content">
            <button id="btn-close-image" class="image-close">✕</button>
            <img id="full-image" class="full-image">
            <div class="image-caption">点击图片外区域关闭</div>
        </div>
    </div>

    <!-- 提示信息 -->
    <div id="selection-hint" class="hint hidden"></div>

    <script>
        // 从URL参数获取用户ID和拥有者ID
        function getActorIdFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const actorId = urlParams.get('actor_id');
            return actorId || '';
        }
        
        function getOwnerIdFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const ownerId = urlParams.get('owner_id');
            return ownerId || 'default';
        }
        
        // 设置全局用户ID和拥有者ID变量
        window.currentActorId = getActorIdFromURL();
        window.currentOwnerId = getOwnerIdFromURL();
        
        // 配置Socket.IO连接，确保与服务器兼容
        const socket = io({
            path: '/socket.io',
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionAttempts: 5,
            reconnectionDelay: 1000
        });
        
        // 设置全局socket变量供其他脚本使用
        window.socket = socket;
        
        // 初始化用户ID和拥有者ID显示
        if (window.currentActorId || window.currentOwnerId !== 'default') {
            console.log(`[用户初始化] 从URL参数获取到: actor_id=${window.currentActorId}, owner_id=${window.currentOwnerId}`);
            // 可以在页面上显示当前用户ID和拥有者ID
            const header = document.querySelector('#header h1');
            if (header) {
                let infoHtml = '';
                if (window.currentActorId) {
                    infoHtml += ` <span style="font-size: 14px; color: #60a5fa;">用户: ${window.currentActorId}</span>`;
                }
                if (window.currentOwnerId !== 'default') {
                    infoHtml += ` <span style="font-size: 14px; color: #10b981;">拥有者: ${window.currentOwnerId}</span>`;
                }
                header.innerHTML += infoHtml;
            }
        } else {
            console.log(`[用户初始化] 未指定用户ID和拥有者ID，使用默认视图`);
        }
    </script>
    
    <!-- <script src="/static/js/3d_force_graph.js"></script>
    <script src="/static/js/controls.js"></script>
    <script src="/static/js/3d_form.js"></script> -->
    <script src="/static/js/3d_main.js"></script>
</body>
</html>
